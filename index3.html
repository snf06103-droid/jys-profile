<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flower Banner</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; }
        #canvas-container { width: 100%; height: 600px; position: relative; overflow: hidden; background: #fff; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.155.0/build/three.module.js"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');

        // 1. 장면과 카메라 설정
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / 600, 0.1, 1000);
        camera.position.z = 5;

        // 2. 렌더러 설정
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, 600);
        container.appendChild(renderer.domElement);

        // 3. 텍스처 로더
        const loader = new THREE.TextureLoader();

        // [배경 이미지 넣기] - 파일 경로를 실제 파일명으로 바꾸세요
        const bgTexture = loader.load('img/ab.jpg'); 
        const bgGeometry = new THREE.PlaneGeometry(12, 8); 
        const bgMaterial = new THREE.MeshBasicMaterial({ map: bgTexture });
        const background = new THREE.Mesh(bgGeometry, bgMaterial);
        background.position.z = -2; // 꽃보다 더 뒤로 보냅니다
        scene.add(background);

        // [꽃 이미지 넣기] - 파일 경로를 실제 파일명으로 바꾸세요
        const flowerTexture = loader.load('img/cd.png'); 
        const flowerGeometry = new THREE.PlaneGeometry(4, 4); 
        const flowerMaterial = new THREE.MeshBasicMaterial({ map: flowerTexture, transparent: true });
        const flower = new THREE.Mesh(flowerGeometry, flowerMaterial);
        flower.position.z = 1; 
        scene.add(flower);

        // 4. 마우스 인터랙션
        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // 5. 애니메이션
        function animate() {
            requestAnimationFrame(animate);

            // 카메라 움직임에 부드러운 댐핑(Damping) 효과 추가
            const targetX = mouseX * 0.8;
            const targetY = mouseY * 0.5;
            
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        animate();

        // 반응형 창 크기 조절
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / 600;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, 600);
        });
    </script>
</body>
</html>
