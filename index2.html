<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
 .hero {
  position: relative;
  width: 100%;
  height: 100vh; /* 히어로 섹션 높이 */
  overflow: hidden;
  background-color: #000; /* 이미지 로딩 전 배경 */
}

#liquid-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

.hero-content {
  position: relative;
  z-index: 2; /* 캔버스보다 위에 위치 */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
  color: white;
  text-align: center;
  pointer-events: none; /* 마우스 이벤트가 캔버스로 통과되도록 함 */
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
    </style>
</head>
<body>
 <section class="hero">
  <img src="./img/hero-bg-flower.png" id="source-image" alt="Hero Background" style="display: none;">
  
  <canvas id="liquid-canvas"></canvas>

  <div class="hero-content">
    <h1>SMOOTH LIQUID</h1>
    <p>Move your cursor gently</p>
  </div>
</section>


<script>
    const canvas = document.getElementById('liquid-canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true }); // 성능 최적화 옵션
const img = document.getElementById('source-image');
const hero = document.querySelector('.hero');

let width, height;
let mouse = { x: -1000, y: -1000, active: false };

// --- 성능 및 효과 조절 파라미터 (매우 중요) ---
// 픽셀 조작은 계산량이 많으므로, 해상도를 약간 낮춰서 계산하고 나중에 늘리는 것이 성능에 좋습니다.
const qualityRatio = 0.8; // 1.0은 원본 해상도, 0.5~0.8 권장 (성능/화질 타협점)
const mouseRadius = 150;     // 마우스 영향 반경
const distortionStrength = 40; // 일렁임 강도 (픽셀 이동 거리)
// ------------------------------------------

let originalImageData; // 원본 이미지의 픽셀 데이터 저장용
let targetImageData;   // 화면에 그릴 픽셀 데이터 버퍼

img.onload = () => {
  init();
  animate();
};

if (img.complete) {
  img.onload();
}

function init() {
  resize();
  window.addEventListener('resize', resize);

  hero.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    // 계산용 해상도(qualityRatio)에 맞춰 마우스 좌표도 조정
    mouse.x = (e.clientX - rect.left) * qualityRatio;
    mouse.y = (e.clientY - rect.top) * qualityRatio;
    mouse.active = true;
  });

  hero.addEventListener('mouseleave', () => {
    mouse.active = false;
  });
}

function resize() {
  // 실제 화면 크기
  const realWidth = hero.offsetWidth;
  const realHeight = hero.offsetHeight;

  // 계산용 저해상도 크기
  width = Math.floor(realWidth * qualityRatio);
  height = Math.floor(realHeight * qualityRatio);

  // 캔버스 크기는 실제 크기로 설정 (CSS가 늘려줌)
  canvas.width = width;
  canvas.height = height;
  canvas.style.width = realWidth + 'px';
  canvas.style.height = realHeight + 'px';

  // 1. 원본 이미지를 저해상도 캔버스 크기에 맞춰 그리기 (CSS Cover 효과)
  const imgRatio = img.width / img.height;
  const canvasRatio = width / height;
  let renderW, renderH, offsetX, offsetY;

  if (imgRatio > canvasRatio) {
    renderH = height;
    renderW = height * imgRatio;
    offsetX = (width - renderW) / 2;
    offsetY = 0;
  } else {
    renderW = width;
    renderH = width / imgRatio;
    offsetX = 0;
    offsetY = (height - renderH) / 2;
  }

  // 임시 캔버스에 원본 그리기
  ctx.drawImage(img, offsetX, offsetY, renderW, renderH);

  // 2. 그려진 원본의 픽셀 데이터 추출 및 저장
  originalImageData = ctx.getImageData(0, 0, width, height);
  // 3. 결과를 담을 빈 픽셀 버퍼 생성
  targetImageData = ctx.createImageData(width, height);
}

function animate() {
  if (originalImageData && mouse.active) {
    // 픽셀 왜곡 계산 함수 호출
    displacePixels();
  } else if (originalImageData && !mouse.active && targetImageData) {
    // 마우스가 없으면 원본 그리기 (또는 부드럽게 복귀하는 로직 추가 가능)
    ctx.putImageData(originalImageData, 0, 0);
  }

  requestAnimationFrame(animate);
}

// 핵심 함수: 픽셀단위 왜곡 계산
function displacePixels() {
  const srcPixels = originalImageData.data; // 원본 픽셀 [r, g, b, a, r, g, b, a, ...]
  const dstPixels = targetImageData.data; // 결과 픽셀 버퍼

  // 성능을 위해 루프 밖에서 변수 선언
  let x, y, dx, dy, dist, force, angle, power;
  let srcX, srcY, srcIndex, dstIndex;

  for (y = 0; y < height; y++) {
    for (x = 0; x < width; x++) {
      dstIndex = (y * width + x) * 4;

      // 1. 마우스와의 거리 계산
      dx = mouse.x - x;
      dy = mouse.y - y;
      dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < mouseRadius) {
        // 2. 왜곡 계산 (매끈한 물결의 핵심 수학)
        // 0~1 사이의 힘 (마우스 중심이 1, 가장자리가 0)
        force = (mouseRadius - dist) / mouseRadius;
        
        // 부드러운 곡선 적용 (Cubic Easing과 유사) - 층짐 방지 핵심
        power = force * force * force; 

        angle = Math.atan2(dy, dx);

        // 원본 이미지에서 가져올 좌표 계산 (굴절된 좌표)
        srcX = x + Math.cos(angle) * power * distortionStrength;
        srcY = y + Math.sin(angle) * power * distortionStrength;

        // 경계 처리 (캔버스 밖을 참조하지 않도록)
        srcX = Math.max(0, Math.min(width - 1, srcX));
        srcY = Math.max(0, Math.min(height - 1, srcY));

        // 3. 굴절된 좌표의 픽셀 인덱스 계산
        srcIndex = (Math.floor(srcY) * width + Math.floor(srcX)) * 4;

        // 4. 원본 픽셀 값을 결과 버퍼에 복사 (R, G, B, A)
        dstPixels[dstIndex] = srcPixels[srcIndex];
        dstPixels[dstIndex + 1] = srcPixels[srcIndex + 1];
        dstPixels[dstIndex + 2] = srcPixels[srcIndex + 2];
        dstPixels[dstIndex + 3] = srcPixels[srcIndex + 3];
      } else {
        // 반경 밖은 원본 픽셀 그대로 복사
        dstPixels[dstIndex] = srcPixels[dstIndex];
        dstPixels[dstIndex + 1] = srcPixels[dstIndex + 1];
        dstPixels[dstIndex + 2] = srcPixels[dstIndex + 2];
        dstPixels[dstIndex + 3] = srcPixels[dstIndex + 3];
      }
    }
  }

  // 5. 계산된 결과 버퍼를 캔버스에 그리기
  ctx.putImageData(targetImageData, 0, 0);
}
</script>
</body>
</html>
